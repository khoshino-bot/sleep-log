name: notify-line
# data/ にpush、または毎朝10時(JST)に、メイン睡眠を算出してLINE送信する
on:
  push:
    branches: [main]
    paths:
      - "data/**"
  schedule:
    - cron: "0 1 * * *" # 01:00 UTC = 10:00 JST（GitHubの都合で数分ずれることあり）
  workflow_dispatch: {}
permissions:
  contents: write # state/ の送信済み記録を書き込むため
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/notify.mjs
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
