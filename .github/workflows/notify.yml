name: notify-line
# data/ にpushされたら、メイン睡眠を算出してLINE送信する（10:00と16:00にショートカットが保存→即送信）
on:
  push:
    branches: [main]
    paths:
      - "data/**"
  workflow_dispatch: {}
permissions:
  contents: write # state/ の送信済み記録を書き込むため
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/notify.mjs
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
