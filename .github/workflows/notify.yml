name: notify-line
# data/ にpush、または毎朝10:05(JST)に、メイン睡眠を算出してLINE送信する
# 朝のpushは上書きのみ／送信は10:05のcronに一本化（二重送信防止）。昼以降のpushは初回送信/補正。
on:
  push:
    branches: [main]
    paths:
      - "data/**"
  schedule:
    - cron: "5 1 * * *" # 01:05 UTC = 10:05 JST（GitHubの都合で数分ずれることあり）
  workflow_dispatch: {}
permissions:
  contents: write # state/ の送信済み記録を書き込むため
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/notify.mjs
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
